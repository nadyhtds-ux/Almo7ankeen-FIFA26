<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحنكين | ملوك التوقعات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --pitch-night:#0E2A1F; --turf-card:#1B4530; --pitch-line:#EDEAE0;
    --gold:#F4B731; --gold-dim:#9C7A22; --away-red:#D6584A; --ink:#08140F;
    --muted:#9FB8AA; --green-ok:#3FCF7A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(ellipse at 50% -10%, #1d4a32 0%, var(--pitch-night) 55%), var(--pitch-night);color:var(--pitch-line);font-family:'Tajawal',sans-serif;min-height:100vh;}
  .display{font-family:'Cairo',sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:20px 16px 80px;}

  .stadium-header{text-align:center;padding:34px 16px 22px;position:relative;overflow:hidden;}
  .stadium-header::before{content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:200px;background:radial-gradient(ellipse, rgba(244,183,49,0.25) 0%, transparent 70%);pointer-events:none;}
  .eyebrow{display:inline-block;font-size:12px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gold-dim);padding:4px 14px;border-radius:999px;margin-bottom:14px;}
  h1.title{font-size:clamp(28px,6vw,44px);margin:0;font-weight:900;color:var(--pitch-line);text-shadow:0 0 30px rgba(244,183,49,0.25);}
  h1.title span{color:var(--gold);}
  .subtitle{color:var(--muted);margin-top:8px;font-size:15px;}

  .card{background:var(--turf-card);border:1px solid rgba(237,234,224,0.08);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,0.25);}
  .card h2{font-family:'Cairo',sans-serif;font-size:18px;margin:0 0 14px;color:var(--pitch-line);}
  .card h2 .num{color:var(--gold);}

  input[type=text], input[type=password], input[type=datetime-local]{width:100%;background:var(--pitch-night);border:1px solid rgba(237,234,224,0.15);color:var(--pitch-line);padding:13px 14px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;}
  input::placeholder{color:#6e8678;}
  input:focus{outline:2px solid var(--gold);outline-offset:1px;}

  button{cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;border:none;border-radius:10px;padding:13px 20px;font-size:15px;transition:transform .12s ease, filter .12s ease;}
  button:active{transform:scale(0.97);}
  button:disabled{cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:var(--ink);}
  .btn-gold:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent;border:1px solid rgba(237,234,224,0.25);color:var(--pitch-line);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
  .btn-danger{background:transparent;border:1px solid var(--away-red);color:var(--away-red);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;}
  .tab{flex:0 0 auto;padding:10px 16px;border-radius:999px;background:transparent;border:1px solid rgba(237,234,224,0.15);color:var(--muted);font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;white-space:nowrap;}
  .tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

  .userbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;color:var(--muted);font-size:14px;}
  .userbar b{color:var(--gold);}
  .userbar a{color:var(--muted);text-decoration:underline;cursor:pointer;font-size:13px;}

  .conn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:14px;}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:#5a7a68;}
  .conn .dot.live{background:var(--green-ok);box-shadow:0 0 8px var(--green-ok);}

  .round-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:16px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .round-title .line{flex:1;height:1px;background:rgba(244,183,49,0.25);}

  .countdown-box{background:var(--pitch-night);border:1px solid var(--gold-dim);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-family:'Cairo',sans-serif;font-weight:800;color:var(--gold);text-align:center;font-size:14px;}

  @keyframes popSelect{0%{transform:scale(0.9);}60%{transform:scale(1.04);}100%{transform:scale(1);}}
  .match-row{display:flex;align-items:center;gap:10px;background:var(--pitch-night);border:1px solid rgba(237,234,224,0.08);border-radius:12px;padding:10px;margin-bottom:8px;}
  .match-row.tbd{opacity:0.45;}
  .team-pick{flex:1;display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:9px;cursor:pointer;border:1.5px solid transparent;font-size:13px;transition:all .12s ease;}
  .team-pick:hover{background:rgba(244,183,49,0.06);}
  .team-pick.selected{border-color:var(--gold);background:rgba(244,183,49,0.14);color:var(--gold);font-weight:700;animation:popSelect .3s ease;}
  .team-pick.correct{border-color:var(--green-ok);background:rgba(63,207,122,0.14);color:var(--green-ok);font-weight:700;}
  .team-pick.wrong{border-color:var(--away-red);opacity:0.55;}
  .flag-img{width:22px;height:16px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,0.15);flex-shrink:0;}
  .avatar-img{border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--gold);flex-shrink:0;}
  .avatar-fallback{border-radius:50%;background:var(--pitch-night);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px rgba(237,234,224,0.15);flex-shrink:0;}
  .avatar-row{display:flex;align-items:center;gap:8px;}
  .vs{font-family:'Cairo',sans-serif;font-size:11px;color:var(--muted);padding:0 4px;}
  .tbd-label{flex:1;text-align:center;font-size:13px;color:var(--muted);padding:10px;}

  .counter{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .counter b{color:var(--gold);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:right;color:var(--muted);font-weight:600;font-size:11px;padding:8px 6px;border-bottom:1px solid rgba(237,234,224,0.1);}
  td{padding:9px 6px;border-bottom:1px solid rgba(237,234,224,0.06);}
  tr.me{background:rgba(244,183,49,0.08);}
  .rank{font-family:'Cairo',sans-serif;font-weight:900;color:var(--gold);width:26px;}
  .rank.g1{color:#F4B731;}.rank.g2{color:#C9C9C9;}.rank.g3{color:#CD8B4D;}
  .crown{margin-left:4px;}
  .acc-pill{font-size:11px;color:var(--muted);}

  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

  .stat-num{font-family:'Cairo',sans-serif;font-weight:900;font-size:22px;color:var(--gold);}

  .history-row:last-child{border-bottom:none;}

  .chat-box{max-height:220px;overflow-y:auto;background:var(--pitch-night);border-radius:10px;padding:10px;margin-bottom:4px;}
  .chat-msg{font-size:13px;padding:6px 4px;border-bottom:1px solid rgba(237,234,224,0.05);}
  .chat-msg.mine{color:var(--gold);}

  .schedule-row{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid rgba(237,234,224,0.06);font-size:13px;}
  .schedule-row .lbl{font-weight:800;font-family:'Cairo',sans-serif;color:var(--pitch-line);}
  .schedule-row .dt{color:var(--muted);}
  .schedule-row.current{background:rgba(244,183,49,0.08);border-radius:8px;padding-left:8px;padding-right:8px;}

  .toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);padding:12px 22px;border-radius:999px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:100;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .admin-link{position:fixed;bottom:56px;left:10px;font-size:11px;color:#2d4a3a;text-decoration:none;z-index:40;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--turf-card);border-radius:16px;padding:24px;max-width:380px;width:100%;border:1px solid rgba(244,183,49,0.3);}

  .celebrate-modal{text-align:center;background:linear-gradient(160deg, var(--turf-card), #123322);}
  .celebrate-emoji{font-size:52px;margin-bottom:6px;}
  .celebrate-title{font-family:'Cairo',sans-serif;font-weight:900;font-size:20px;color:var(--gold);margin-bottom:6px;}
  .celebrate-sub{color:var(--pitch-line);font-size:15px;margin-bottom:18px;}

  .ticker-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--gold);color:var(--ink);overflow:hidden;white-space:nowrap;padding:9px 0;z-index:60;border-top:2px solid var(--gold-dim);display:none;}
  .ticker-track{display:inline-block;padding-right:60px;animation:ticker-scroll 16s linear infinite;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;}
  @keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
</style>
</head>
<body>

<script>
/* ============ CONFIG ============ */
const FIREBASE_URL = "https://elmo7naken-d8901-default-rtdb.firebaseio.com";
const ADMIN_PIN = "2026";

/* ============ TEAM DATA (id, name, flag emoji fallback, ISO code for flag image) ============ */
const TEAMS = [
  {id:"rsa",name:"جنوب أفريقيا",flag:"🇿🇦",iso:"za"},{id:"can",name:"كندا",flag:"🇨🇦",iso:"ca"},
  {id:"bra",name:"البرازيل",flag:"🇧🇷",iso:"br"},{id:"jpn",name:"اليابان",flag:"🇯🇵",iso:"jp"},
  {id:"ger",name:"ألمانيا",flag:"🇩🇪",iso:"de"},{id:"par",name:"باراغواي",flag:"🇵🇾",iso:"py"},
  {id:"ned",name:"هولندا",flag:"🇳🇱",iso:"nl"},{id:"mar",name:"المغرب",flag:"🇲🇦",iso:"ma"},
  {id:"civ",name:"كوت ديفوار",flag:"🇨🇮",iso:"ci"},{id:"nor",name:"النرويج",flag:"🇳🇴",iso:"no"},
  {id:"fra",name:"فرنسا",flag:"🇫🇷",iso:"fr"},{id:"swe",name:"السويد",flag:"🇸🇪",iso:"se"},
  {id:"mex",name:"المكسيك",flag:"🇲🇽",iso:"mx"},{id:"ecu",name:"إكوادور",flag:"🇪🇨",iso:"ec"},
  {id:"eng",name:"إنجلترا",flag:"🏴",iso:"gb-eng"},{id:"cod",name:"الكونغو الديمقراطية",flag:"🇨🇩",iso:"cd"},

  {id:"aus",name:"أستراليا",flag:"🇦🇺",iso:"au"},{id:"egy",name:"مصر",flag:"🇪🇬",iso:"eg"},

];
const TEAM_MAP = Object.fromEntries(TEAMS.map(t=>[t.id,t]));
function flagImg(t){
  if(!t) return "";
  return `<img src="https://flagcdn.com/w40/${t.iso}.png" class="flag-img" alt="" onerror="this.outerHTML='<span>${t.flag}</span>'">`;
}
function avatarImg(userKey, size){
  const u = MIRROR.users[userKey];
  const s = size||32;
  if(u && u.photo){ return `<img src="${u.photo}" class="avatar-img" style="width:${s}px;height:${s}px;">`; }
  return `<div class="avatar-fallback" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.55)}px;">👤</div>`;
}
function resizeImageFile(file, maxDim){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } } else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadProfilePhoto(evt){
  const file = evt.target.files[0];
  if(!file) return;
  if(!file.type.startsWith("image/")){ showToast("لازم تختار صورة"); evt.target.value=""; return; }
  showToast("جاري رفع الصورة...");
  try{
    const dataUrl = await resizeImageFile(file, 200);
    await fbPatch("users/"+state.userKey, {photo: dataUrl});
    MIRROR.users[state.userKey] = {...(MIRROR.users[state.userKey]||{}), photo: dataUrl};
    showToast("اتحفظت الصورة ✅");
    renderTabOnly();
  }catch(e){ showToast("حصلت مشكلة في رفع الصورة"); }
  evt.target.value="";
}

/* ============ REAL BRACKET (Round of 32 → Final) ============ */
const MATCHES = {
  m1:{teams:["rsa","can"]}, m2:{teams:["bra","jpn"]}, m3:{teams:["ger","par"]}, m4:{teams:["ned","mar"]},
  m5:{teams:["civ","nor"]}, m6:{teams:["fra","swe"]}, m7:{teams:["mex","ecu"]}, m8:{teams:["eng","cod"]},
  m9:{teams:["bel","sen"]}, m10:{teams:["usa","bih"]}, m11:{teams:["esp","aut"]}, m12:{teams:["por","cro"]},
  m13:{teams:["sui","alg"]}, m14:{teams:["col","gha"]}, m15:{teams:["aus","egy"]}, m16:{teams:["arg","cpv"]},
  m17:{from:["m1","m4"]}, m18:{from:["m2","m5"]}, m19:{from:["m3","m6"]}, m20:{from:["m7","m8"]},
  m21:{from:["m9","m10"]}, m22:{from:["m11","m12"]}, m23:{from:["m13","m14"]}, m24:{from:["m15","m16"]},
  m25:{from:["m17","m18"]}, m26:{from:["m19","m20"]}, m27:{from:["m21","m22"]}, m28:{from:["m23","m24"]},
  m29:{from:["m25","m26"]}, m30:{from:["m27","m28"]},
  m31:{from:["m29","m30"]}
};
const ROUNDS = [
  {key:"r32", label:"دور الـ32", matches:["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16"], dateText:"حتى 3 يوليو"},
  {key:"r16", label:"دور الـ16", matches:["m17","m18","m19","m20","m21","m22","m23","m24"], dateText:"4 - 7 يوليو"},
  {key:"qf", label:"ربع النهائي", matches:["m25","m26","m27","m28"], dateText:"9 - 11 يوليو"},
  {key:"sf", label:"نصف النهائي", matches:["m29","m30"], dateText:"14 - 15 يوليو"},
  {key:"final", label:"النهائي", matches:["m31"], dateText:"19 يوليو"}
];
const MATCH_DATES = {
  m1:"28 يونيو", m2:"29 يونيو", m3:"29 يونيو", m4:"30 يونيو", m5:"30 يونيو", m6:"30 يونيو",
  m7:"1 يوليو", m8:"1 يوليو", m9:"1 يوليو", m10:"1 يوليو",
  m11:"2 يوليو", m12:"2 يوليو", m13:"2 يوليو",
  m14:"3 يوليو", m15:"3 يوليو", m16:"3 يوليو"
};
const MATCH_IDS = Object.keys(MATCHES);
function matchDateLabel(id){ return MATCH_DATES[id] ? `<div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px;">📅 ${MATCH_DATES[id]} (تقريبي بتوقيت القاهرة)</div>` : ""; }
function getMatchTeams(matchId, resultsObj){
  const m = MATCHES[matchId];
  if(m.teams) return m.teams;
  return [resultsObj[m.from[0]]||null, resultsObj[m.from[1]]||null];
}
function sanitizeKey(s){ return s.trim().replace(/[.#$\[\]\/]/g,"_").slice(0,40); }

/* ============ STATE ============ */
let state = {
  username:null, userKey:null, screen:"login", tab:"predict", draft:{}, groupView:null, profileView:null,
  connected:{core:false, predictions:false, submissions:false, users:false, groups:false, chats:false},
  _adminDraft:null
};
let MIRROR = { core:{results:{}, roundState:{currentIndex:0}, roundHistory:{}, roundDeadlines:{}, announcement:""}, predictions:{}, submissions:{}, users:{}, groups:{}, chats:{} };
let seenRoundHistoryKeys = new Set();
let coreLoadedOnce = false;
let countdownTimer = null;

/* ============ FIREBASE REST ============ */
async function fbSet(path, value){
  try{ const res = await fetch(`${FIREBASE_URL}/${path}.json`, {method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(value)}); return res.ok; }
  catch(e){ console.error(e); return false; }
}
async function fbPatch(path, value){
  try{ const res = await fetch(`${FIREBASE_URL}/${path}.json`, {method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify(value)}); return res.ok; }
  catch(e){ console.error(e); return false; }
}

/* ============ DEEP MERGE FOR SSE ============ */
function deepApplyPut(store, path, data){
  if(path === "/") return data === null ? {} : data;
  const parts = path.slice(1).split("/");
  let obj = store;
  for(let i=0;i<parts.length-1;i++){ const p=parts[i]; if(typeof obj[p]!=="object"||obj[p]===null) obj[p]={}; obj=obj[p]; }
  const last = parts[parts.length-1];
  if(data===null) delete obj[last]; else obj[last]=data;
  return store;
}
function deepApplyPatch(store, path, data){
  let obj = store;
  if(path!=="/"){ const parts=path.slice(1).split("/"); for(const p of parts){ if(typeof obj[p]!=="object"||obj[p]===null) obj[p]={}; obj=obj[p]; } }
  Object.assign(obj, data||{});
  return store;
}
function openStream(node){
  return new Promise((resolve)=>{
    let resolved=false;
    const es = new EventSource(`${FIREBASE_URL}/${node}.json`);
    es.addEventListener("put",(e)=>{
      const payload=JSON.parse(e.data);
      MIRROR[node]=deepApplyPut(MIRROR[node]||{}, payload.path, payload.data);
      state.connected[node]=true;
      if(!resolved){resolved=true;resolve();}
      onRemoteUpdate(node);
    });
    es.addEventListener("patch",(e)=>{
      const payload=JSON.parse(e.data);
      deepApplyPatch(MIRROR[node]||{}, payload.path, payload.data);
      onRemoteUpdate(node);
    });
    es.onerror=()=>{ state.connected[node]=false; if(!resolved){resolved=true;resolve();} updateConnDot(); };
  });
}
function onRemoteUpdate(node){
  if(node==="core"){
    if(!MIRROR.core.results) MIRROR.core.results={};
    if(!MIRROR.core.roundState) MIRROR.core.roundState={currentIndex:0};
    if(!MIRROR.core.roundHistory) MIRROR.core.roundHistory={};
    if(!MIRROR.core.roundDeadlines) MIRROR.core.roundDeadlines={};
    const keys = Object.keys(MIRROR.core.roundHistory);
    if(!coreLoadedOnce){ keys.forEach(k=>seenRoundHistoryKeys.add(k)); coreLoadedOnce=true; }
    else{
      keys.forEach(k=>{
        if(!seenRoundHistoryKeys.has(k)){
          seenRoundHistoryKeys.add(k);
          const rd = ROUNDS.find(r=>r.key===k);
          showCelebration(rd?rd.label:k, MIRROR.core.roundHistory[k]);
        }
      });
    }
    updateTicker();
  }
  updateConnDot();
  if(state.screen==="home") renderTabOnly();
}
async function initSync(){
  await Promise.all([openStream("core"), openStream("predictions"), openStream("submissions"), openStream("users"), openStream("groups"), openStream("chats")]);
  state.screen="login"; render(); updateTicker(); startCountdownLoop();
}

/* ============ SCORING ============ */
function scorePrediction(pred, results){
  if(!pred||!results) return 0;
  let total=0; MATCH_IDS.forEach(id=>{ if(results[id] && pred[id]===results[id]) total++; });
  return total;
}
function decidedMatchesCount(){ const results=MIRROR.core.results||{}; return MATCH_IDS.filter(id=>results[id]).length; }
function accuracyPct(total){ const d=decidedMatchesCount(); return d? Math.round(total/d*100):0; }
function computeLeaderboardRows(){
  const results = MIRROR.core.results||{};
  const rows = Object.entries(MIRROR.users||{}).map(([key,u])=>({ key, user:u.name||key, total:scorePrediction(MIRROR.predictions[key],results) }));
  rows.sort((a,b)=>b.total-a.total);
  return rows;
}

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function updateConnDot(){ const el=document.getElementById("connDot"); if(!el) return; const allLive=Object.values(state.connected).every(v=>v); el.className="dot"+(allLive?" live":""); }

/* ============ COUNTDOWN ============ */
function startCountdownLoop(){
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(()=>{
    const el = document.getElementById("countdownBox");
    if(!el || state.screen!=="home" || state.tab!=="predict") return;
    const rs = MIRROR.core.roundState||{currentIndex:0};
    if(rs.currentIndex>=ROUNDS.length) return;
    const round = ROUNDS[rs.currentIndex];
    const deadline = (MIRROR.core.roundDeadlines||{})[round.key];
    if(!deadline){ el.textContent="⏳ الأدمن لسه محددش موعد نهائي لهذا الدور"; return; }
    const diff = new Date(deadline).getTime() - Date.now();
    if(diff<=0){ el.textContent="⏰ انتهى الوقت المحدد — في انتظار الأدمن يقفل الدور"; return; }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    el.textContent = `⏳ الوقت المتبقي لقفل ${round.label}: ${d>0?d+'ي ':''}${h}س ${m}د ${s}ث`;
  }, 1000);
}

function matchRowPickable(id, tA, tB, picked){

    <div class="team-pick ${picked===tA.id?'selected':''}" onclick="pickWinner('${id}','${tA.id}')">${flagImg(tA)}<span>${tA.name}</span></div>
    <div class="vs">VS</div>
    <div class="team-pick ${picked===tB.id?'selected':''}" onclick="pickWinner('${id}','${tB.id}')">${flagImg(tB)}<span>${tB.name}</span></div>
  </div>`;
}
function matchRowReadOnly(tA, tB, mine, resultId){
  const aCls = mine===tA.id ? (resultId?(resultId===tA.id?'correct':'wrong'):'selected') : '';
  const bCls = mine===tB.id ? (resultId?(resultId===tB.id?'correct':'wrong'):'selected') : '';
  return `<div class="match-row">
    <div class="team-pick ${aCls}">${flagImg(tA)}<span>${tA.name}</span></div>
    <div class="vs">VS</div>
    <div class="team-pick ${bCls}">${flagImg(tB)}<span>${tB.name}</span></div>

}
function renderPredictTab(){
  const rs=MIRROR.core.roundState||{currentIndex:0};
  const idx=rs.currentIndex;
  const results=MIRROR.core.results||{};
  if(idx>=ROUNDS.length){
    return `<div class="card"><div class="empty">🏆 انتهت البطولة! شكرًا لمتابعتك وتوقعاتك طول الطريق</div></div>`+renderMyHistory(ROUNDS.length, results);
  }
  const round=ROUNDS[idx];
  const mySubmitted=((MIRROR.submissions||{})[state.userKey]||{})[round.key];
  const myPreds=MIRROR.predictions[state.userKey]||{};
  let html = `<div class="card"><div class="round-title" style="font-size:20px;">${round.label}<span class="line"></span></div>
    <div class="countdown-box" id="countdownBox">⏳ جاري الحساب...</div>`;
  if(mySubmitted){
    html += `<div class="counter" style="margin-bottom:14px;">✅ اتبعتت توقعاتك للدور ده — استنى النتائج الفعلية</div>`;
    round.matches.forEach(id=>{ const teams=getMatchTeams(id,results); const tA=TEAM_MAP[teams[0]], tB=TEAM_MAP[teams[1]]; html+=matchRowReadOnly(tA,tB,myPreds[id],null); });
  } else {
    round.matches.forEach(id=>{ const teams=getMatchTeams(id,results); const tA=TEAM_MAP[teams[0]], tB=TEAM_MAP[teams[1]]; html+=matchDateLabel(id)+matchRowPickable(id,tA,tB,state.draft[id]); });
    const filled=round.matches.filter(id=>state.draft[id]).length;
    html += `<div class="counter">اخترت <b>${filled}</b> من <b>${round.matches.length}</b></div>`;
    html += `<div class="btn-row"><button class="btn-gold" ${filled<round.matches.length?'disabled style="opacity:.4"':''} onclick="submitRoundPredictions('${round.key}')">إرسال توقعاتي (نهائي، مش هتقدر تعدلها)</button></div>`;
  }
  html += `</div>`;
  html += renderMyHistory(idx, results);

function pickWinner(matchId, teamId){ state.draft[matchId]=teamId; renderTabOnly(); }
async function submitRoundPredictions(roundKey){
  const round=ROUNDS.find(r=>r.key===roundKey);
  const picks={};
  round.matches.forEach(id=>{ if(state.draft[id]) picks[id]=state.draft[id]; });
  if(Object.keys(picks).length<round.matches.length){ showToast("لازم تختار كل المباريات"); return; }
  await fbPatch("predictions/"+state.userKey, picks);
  MIRROR.predictions[state.userKey]={...(MIRROR.predictions[state.userKey]||{}), ...picks};
  await fbSet(`submissions/${state.userKey}/${roundKey}`, Date.now());
  MIRROR.submissions[state.userKey]={...(MIRROR.submissions[state.userKey]||{}), [roundKey]:Date.now()};
  state.draft={};
  showToast("اتبعتت توقعاتك ✅ بالتوفيق!");
  renderTabOnly();
}
function renderMyHistory(currentIdx, results){
  const myPreds=MIRROR.predictions[state.userKey]||{};
  let html="";
  for(let i=0;i<currentIdx;i++){
    const r=ROUNDS[i];
    const submitted=((MIRROR.submissions||{})[state.userKey]||{})[r.key];
    if(!submitted) continue;
    html += `<div class="card"><h2 style="font-size:15px;"><span class="num">📜</span> ${r.label} — توقعاتك</h2>`;
    r.matches.forEach(id=>{ const teams=getMatchTeams(id,results); if(!teams[0]||!teams[1]) return; const tA=TEAM_MAP[teams[0]], tB=TEAM_MAP[teams[1]]; html+=matchRowReadOnly(tA,tB,myPreds[id],results[id]); });
    html += `</div>`;
  }
  return html;
}

  if(rows.length===0){ html += `<div class="empty">محدش سجل توقعات لسه</div>`; }
  else {
    html += `<table><thead><tr><th>#</th><th>الاسم</th><th>النقاط</th><th>الدقة</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const rankClass=i===0?'g1':i===1?'g2':i===2?'g3':'';
      const crown=(i===0 && r.total>0)?'<span class="crown">👑</span>':'';
      html += `<tr class="${r.user===state.username?'me':''}"><td class="rank ${rankClass}">${i+1}</td><td onclick="viewProfile('${r.key}')" style="cursor:pointer;"><span class="avatar-row" style="display:inline-flex;text-decoration:underline;text-decoration-color:rgba(244,183,49,0.25);">${avatarImg(r.key,22)}${crown}${escapeHtml(r.user)}${r.user===state.username?' (انت)':''}</span></td><td>${r.total}</td><td class="acc-pill">${accuracyPct(r.total)}%</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;

function renderStatsCard(){
  const results=MIRROR.core.results||{};
  const totalMatches=decidedMatchesCount();
  const allPreds=Object.values(MIRROR.predictions||{});
  let totalGuesses=0, totalCorrect=0;
  allPreds.forEach(p=>{ MATCH_IDS.forEach(id=>{ if(p[id] && results[id]){ totalGuesses++; if(p[id]===results[id]) totalCorrect++; } }); });
  const overallAcc = totalGuesses? Math.round(totalCorrect/totalGuesses*100):0;
  const participants=Object.keys(MIRROR.users||{}).length;
  return `<div class="card"><h2><span class="num">📊</span> إحصائيات عامة</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${participants}</div><div class="stat-lbl">مشترك</div></div>
      <div class="stat-box"><div class="stat-num">${totalMatches}</div><div class="stat-lbl">مباراة اتحسمت</div></div>
      <div class="stat-box"><div class="stat-num">${overallAcc}%</div><div class="stat-lbl">دقة الجميع</div></div>
    </div>
  </div>`;
}
function renderRoundHistoryCards(){
  const rh=MIRROR.core.roundHistory||{};
  const entries=ROUNDS.filter(r=>rh[r.key]).map(r=>({label:r.label, ...rh[r.key]}));
  if(entries.length===0) return "";
  let html=`<div class="card"><h2><span class="num">🎉</span> متصدر كل دور</h2>`;
  entries.forEach(e=>{ html += `<div class="history-row"><b style="color:var(--gold);">${escapeHtml(e.label)}</b><span>👑 ${escapeHtml(e.leaderName)} — ${e.points} نقطة</span></div>`; });
  html += `</div>`;
  return html;
}

function renderGroupDetailedPicks(g){
  const rs=MIRROR.core.roundState||{currentIndex:0};

  if(idx<0) return "";
  const round=ROUNDS[idx];

  round.matches.forEach(id=>{ const teams=getMatchTeams(id,results); const a=TEAM_MAP[teams[0]], b=TEAM_MAP[teams[1]]; html += `<th>${a?a.name.slice(0,4):'؟'}/${b?b.name.slice(0,4):'؟'}</th>`; });
  html += `</tr></thead><tbody>`;
  (g.members||[]).forEach(key=>{
    const preds=MIRROR.predictions[key]||{};
    html += `<tr><td>${escapeHtml((MIRROR.users[key]||{}).name||key)}</td>`;
    round.matches.forEach(id=>{
      const pick=preds[id]; const correct=results[id]&&pick===results[id]; const wrong=results[id]&&pick&&pick!==results[id];
      const t=pick?TEAM_MAP[pick]:null;
      html += `<td style="color:${correct?'var(--green-ok)':wrong?'var(--away-red)':'var(--muted)'}">${t?flagImg(t):'-'}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div></div>`;
  return html;
}

async function sendChatMsg(gid){
  const inp=document.getElementById("chatInput"); const text=inp.value.trim();
  if(!text) return;
  const id="msg"+Date.now()+Math.floor(Math.random()*1000);
  const msg={user:state.userKey, text, ts:Date.now()};
  await fbSet(`chats/${gid}/${id}`, msg);
  if(!MIRROR.chats[gid]) MIRROR.chats[gid]={};
  MIRROR.chats[gid][id]=msg;
  inp.value="";
  renderTabOnly();
}
async function createGroup(){
  const name=document.getElementById("newGroupName").value.trim();
  if(!name){ showToast("اكتب اسم المجموعة"); return; }
  const id="g"+Date.now();
  const g={id, name, code:genCode(), owner:state.userKey, members:[state.userKey]};
  await fbSet("groups/"+id, g); MIRROR.groups[id]=g;
  showToast("اتعملت المجموعة 🎉"); renderTabOnly();
}
async function joinGroup(){
  const code=document.getElementById("joinCode").value.trim().toUpperCase();
  if(!code){ showToast("اكتب الكود"); return; }
  const entry=Object.entries(MIRROR.groups||{}).find(([id,g])=>g.code===code);
  if(!entry){ showToast("الكود مش موجود"); return; }
  const [id,g]=entry;
  if(!(g.members||[]).includes(state.userKey)){ g.members=[...(g.members||[]), state.userKey]; await fbSet("groups/"+id, g); MIRROR.groups[id]=g; }
  showToast(`انضميت لـ ${g.name} ✅`); renderTabOnly();
}
function viewGroup(id){ state.groupView=id; renderTabOnly(); }
function backToGroups(){ state.groupView=null; renderTabOnly(); }

/* ============ PROFILE TAB ============ */
function computeBadges(userKey){
  const results=MIRROR.core.results||{};
  const pred=MIRROR.predictions[userKey]||{};
  const totalDecided=decidedMatchesCount();
  const correct=scorePrediction(pred, results);
  const badges=[];
  const acc = totalDecided? correct/totalDecided*100 : 0;
  if(totalDecided>=8 && acc>=70) badges.push("🎯 قناص التوقعات (دقة 70%+)");
  const rs=MIRROR.core.roundState||{currentIndex:0};
  for(let i=0;i<rs.currentIndex;i++){
    const r=ROUNDS[i];
    const submitted=((MIRROR.submissions||{})[userKey]||{})[r.key];
    if(!submitted) continue;
    const allCorrect=r.matches.every(id=>results[id] && pred[id]===results[id]);
    if(allCorrect){ badges.push(`🔥 دور مثالي (${r.label})`); break; }
  }
  if(badges.length===0) badges.push("لسه مفيش شارات — كمّل توقعاتك عشان تكسب شارات 🏅");
  return badges;
}
function renderProgressChart(targetKey){
  targetKey = targetKey || state.userKey;
  const rh=MIRROR.core.roundHistory||{};
  const pts=ROUNDS.filter(r=>rh[r.key] && rh[r.key].scores).map(r=>({label:r.label, value:(rh[r.key].scores[targetKey]||0)}));
  if(pts.length<2) return `<div class="card"><h2 style="font-size:15px;"><span class="num">📈</span> تطور نقاطك</h2><div class="empty">هيظهر الرسم بعد ما دورين يتقفلوا على الأقل</div></div>`;
  const w=280,h=100,pad=12;
  const max=Math.max(...pts.map(p=>p.value),1);
  const stepX=(w-2*pad)/(pts.length-1);
  const coords=pts.map((p,i)=>{ const x=pad+i*stepX; const y=h-pad-(p.value/max)*(h-2*pad); return [x,y]; });
  const polyline=coords.map(c=>c.join(",")).join(" ");
  const dots=coords.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3.5" fill="#F4B731"/>`).join("");
  const labels=pts.map((p,i)=>`<text x="${coords[i][0]}" y="${h-1}" font-size="8" fill="#9FB8AA" text-anchor="middle">${p.value}</text>`).join("");
  return `<div class="card"><h2 style="font-size:15px;"><span class="num">📈</span> تطور نقاطك عبر الأدوار</h2>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:110px;"><polyline points="${polyline}" fill="none" stroke="#F4B731" stroke-width="2"/>${dots}${labels}</svg></div>`;
}
function renderUserPredictionsTable(targetKey){
  const results=MIRROR.core.results||{};
  const rs=MIRROR.core.roundState||{currentIndex:0};
  const preds=MIRROR.predictions[targetKey]||{};
  let html=`<div class="card"><h2 style="font-size:15px;"><span class="num">📋</span> جدول التوقعات الكامل</h2>`;
  let any=false;
  ROUNDS.forEach((r,i)=>{
    if(i>rs.currentIndex) return;
    const hasAnyPick = r.matches.some(id=>preds[id]);
    if(!hasAnyPick) return;
    any=true;
    const resultKnown = i<rs.currentIndex;
    html += `<div class="round-title" style="font-size:14px;margin-top:10px;">${r.label}${resultKnown?'':' (جاري)'}<span class="line"></span></div>`;
    r.matches.forEach(id=>{
      const teams=getMatchTeams(id, results);
      if(!teams[0]||!teams[1]) return;
      const tA=TEAM_MAP[teams[0]], tB=TEAM_MAP[teams[1]];
      html += matchRowReadOnly(tA, tB, preds[id], resultKnown?results[id]:null);
    });
  });
  if(!any) html += `<div class="empty">لسه معندوش توقعات مسجلة</div>`;
  html += `</div>`;
  return html;
}
function renderAllUsersBrowse(){
  const users=Object.entries(MIRROR.users||{}).map(([key,u])=>({key,name:u.name||key})).filter(u=>u.key!==state.userKey);
  users.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
  let html=`<div class="card"><h2><span class="num">🔎</span> تصفح حسابات اللاعبين</h2>
    <input type="text" id="userSearchInput" placeholder="دور على اسم لاعب..." oninput="filterUserList()" style="margin-bottom:10px;">
    <div id="userListBox">`;
  if(users.length===0){ html += `<div class="empty">مفيش لاعبين تانيين مسجلين لسه</div>`; }
  users.forEach(u=>{
    html += `<div class="group-card user-row" data-name="${escapeHtml(u.name.toLowerCase())}" onclick="viewProfile('${u.key}')"><div class="avatar-row"><span>${avatarImg(u.key,32)}</span><div style="font-weight:700;">${escapeHtml(u.name)}</div></div><div class="meta">عرض الحساب ←</div></div>`;
  });
  html += `</div></div>`;
  return html;
}
function filterUserList(){
  const q=document.getElementById("userSearchInput").value.trim().toLowerCase();
  document.querySelectorAll("#userListBox .user-row").forEach(el=>{ el.style.display = el.getAttribute("data-name").includes(q) ? "flex" : "none"; });
}
function renderProfileTab(){
  const targetKey = state.profileView || state.userKey;
  const isOwn = targetKey === state.userKey;
  const rows=computeLeaderboardRows();
  const targetRow=rows.find(r=>r.key===targetKey);
  const total=targetRow?targetRow.total:0;
  const rank=rows.findIndex(r=>r.key===targetKey)+1;
  const isLeader=rank===1 && total>0;
  const targetName=(MIRROR.users[targetKey]||{}).name || targetKey;
  const targetGroups=Object.values(MIRROR.groups||{}).filter(g=>(g.members||[]).includes(targetKey));
  const badges=computeBadges(targetKey);

  let html = `<div class="card">`;
  if(!isOwn) html += `<a onclick="viewProfile(null)" style="color:var(--gold);cursor:pointer;font-size:13px;">← رجوع لحسابي</a>`;
  html += `<h2 style="margin-top:${isOwn?'0':'10px'};"><span class="num">👤</span> ${isOwn?'حسابي':'حساب لاعب'}</h2>
    <div class="avatar-row" style="margin-bottom:6px;">
      ${avatarImg(targetKey, 64)}
      <div style="flex:1;">
        <div style="font-size:22px;font-weight:800;color:var(--gold);font-family:'Cairo',sans-serif;">${isLeader?'👑 ':''}${escapeHtml(targetName)}</div>
        ${isOwn?`<label class="btn-ghost btn-sm" style="display:inline-block;cursor:pointer;margin-top:6px;">تغيير الصورة الشخصية<input type="file" accept="image/*" style="display:none" onchange="uploadProfilePhoto(event)"></label>`:''}
      </div>
    </div>
    <div class="counter" style="margin-top:10px;">الترتيب العام: <b>#${rank||'-'}</b> &nbsp;|&nbsp; مجموع النقاط: <b>${total}</b> &nbsp;|&nbsp; الدقة: <b>${accuracyPct(total)}%</b></div>
    <div style="margin-top:10px;">${badges.map(b=>`<span class="badge-pill">${escapeHtml(b)}</span>`).join("")}</div>
  </div>`;
  html += renderProgressChart(targetKey);
  html += renderUserPredictionsTable(targetKey);
  html += `<div class="card"><h2><span class="num">👥</span> ${isOwn?'مجموعاتي':'مجموعات اللاعب'} (${targetGroups.length})</h2>`;
  if(targetGroups.length===0){ html += `<div class="empty">لسه مش منضم لأي مجموعة</div>`; }
  else {
    targetGroups.forEach(g=>{ html += `<div class="group-card" onclick="setTab('groups');viewGroup('${g.id}')"><div><div style="font-weight:700;">${escapeHtml(g.name)}</div><div class="meta">${(g.members||[]).length} أعضاء</div></div><span class="code-badge">${g.code}</span></div>`; });
  }
  html += `</div>`;
  if(isOwn) html += renderAllUsersBrowse();
  return html;
}

/* ============ SCHEDULE TAB ============ */
function renderScheduleTab(){
  const rs=MIRROR.core.roundState||{currentIndex:0};
  const deadlines=MIRROR.core.roundDeadlines||{};
  let html = `<div class="card"><h2><span class="num">🗓️</span> جدول أدوار البطولة</h2>`;
  ROUNDS.forEach((r,i)=>{
    const dl=deadlines[r.key];
    const dlText = dl ? new Date(dl).toLocaleString('ar-EG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : "لسه محددش";
    html += `<div class="schedule-row ${i===rs.currentIndex?'current':''}">
      <div><div class="lbl">${r.label} ${i===rs.currentIndex?'⏳ (مفتوح دلوقتي)':i<rs.currentIndex?'✅':''}</div><div class="dt">مواعيد المباريات الرسمية: ${r.dateText}</div></div>
      <div class="dt">قفل التوقعات: ${dlText}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

/* ============ ADMIN ============ */
function openAdminModal(){ document.getElementById("adminModal").classList.add("show"); }
function closeAdminModal(){ document.getElementById("adminModal").classList.remove("show"); document.getElementById("adminPinInput").value=""; }
async function checkAdminPin(){
  const val=document.getElementById("adminPinInput").value;
  if(val===ADMIN_PIN){ closeAdminModal(); renderAdmin(); } else { showToast("الرمز غلط"); }
}
function clearAdminDownstream(matchId){
  const roundIdx=ROUNDS.findIndex(r=>r.matches.includes(matchId));
  for(let j=roundIdx+1;j<ROUNDS.length;j++){
    ROUNDS[j].matches.forEach(id=>{ const teams=getMatchTeams(id, state._adminDraft); if(state._adminDraft[id] && !teams.includes(state._adminDraft[id])) delete state._adminDraft[id]; });
  }
}
function adminPick(matchId, teamId){ state._adminDraft[matchId]=teamId; clearAdminDownstream(matchId); renderAdmin(); }

function renderAdmin(){
  const rs=MIRROR.core.roundState||{currentIndex:0};
  if(!state._adminDraft) state._adminDraft=JSON.parse(JSON.stringify(MIRROR.core.results||{}));
  const app=document.getElementById("app");
  const currentIdx=rs.currentIndex;
  const tournamentDone=currentIdx>=ROUNDS.length;
  let html = `<div class="stadium-header"><span class="eyebrow">ADMIN PANEL</span><h1 class="title">لوحة <span>التحكم</span></h1></div>
  <div class="userbar"><div></div><a onclick="render()">رجوع للموقع</a></div>`;

  html += `<div class="card"><h2><span class="num">🚦</span> التحكم بالدور الحالي</h2>
    <div class="counter">الدور المفتوح للتوقعات الآن: <b>${tournamentDone?'انتهت البطولة 🏆':ROUNDS[currentIdx].label}</b></div>`;
  if(!tournamentDone){
    const dlVal = (MIRROR.core.roundDeadlines||{})[ROUNDS[currentIdx].key] || "";
    const dlLocal = dlVal ? new Date(dlVal).toISOString().slice(0,16) : "";
    html += `<div style="margin-bottom:12px;">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px;">موعد قفل التوقعات لهذا الدور</label>
      <input type="datetime-local" id="deadlineInput" value="${dlLocal}" style="margin-bottom:8px;">
      <button class="btn-ghost btn-sm" onclick="saveDeadline()">حفظ الموعد</button>
    </div>
    <div class="btn-row"><button class="btn-gold" onclick="endCurrentRound()">إنهاء الدور وفتح التالي 🎉</button></div>`;
  }
  html += `</div>`;

  if(!tournamentDone){
    html += `<div class="card"><h2><span class="num">⚽</span> إدخال نتائج الأدوار</h2>`;
    ROUNDS.forEach((r,i)=>{
      if(i>currentIdx) return;
      html += `<div style="margin-bottom:20px;"><div class="round-title">${r.label} ${i<currentIdx?'(مغلق)':'(الحالي)'}<span class="line"></span></div>`;
      r.matches.forEach(id=>{
        const teams=getMatchTeams(id, state._adminDraft);
        if(teams[0] && teams[1]){
          const tA=TEAM_MAP[teams[0]], tB=TEAM_MAP[teams[1]]; const picked=state._adminDraft[id];
          html += `${matchDateLabel(id)}<div class="match-row">
            <div class="team-pick ${picked===tA.id?'selected':''}" onclick="adminPick('${id}','${tA.id}')">${flagImg(tA)}<span>${tA.name}</span></div>
            <div class="vs">VS</div>
            <div class="team-pick ${picked===tB.id?'selected':''}" onclick="adminPick('${id}','${tB.id}')">${flagImg(tB)}<span>${tB.name}</span></div>
          </div>`;
        } else { html += `<div class="match-row tbd"><div class="tbd-label">في انتظار نتيجة سابقة ⏳</div></div>`; }
      });
      html += `</div>`;
    });
    html += `<div class="btn-row"><button class="btn-gold" onclick="saveAdminResults()">حفظ النتائج</button></div></div>`;
  }

  html += `<div class="card"><h2><span class="num">📢</span> الشريط الإعلاني</h2>
    <input type="text" id="announceInput" placeholder="اكتب إعلان يظهر لكل المستخدمين" value="${escapeHtml(MIRROR.core.announcement||"")}" style="margin-bottom:10px;">
    <div class="btn-row"><button class="btn-gold" onclick="saveAnnouncement()">حفظ الإعلان</button><button class="btn-ghost" onclick="clearAnnouncement()">مسح الإعلان</button></div>
  </div>`;

  html += `<div class="card"><h2><span class="num">📁</span> النسخ الاحتياطي والتصدير</h2>
    <div class="btn-row">
      <button class="btn-gold btn-sm" onclick="exportExcel()">تصدير Excel للترتيب</button>
      <button class="btn-ghost btn-sm" onclick="exportBackup()">تنزيل نسخة احتياطية (JSON)</button>
      <button class="btn-ghost btn-sm" onclick="triggerImportBackup()">استرجاع نسخة احتياطية</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
  </div>`;

  html += `<div class="card"><h2><span class="num">🗑️</span> إدارة الحسابات</h2>`;
  const users=Object.entries(MIRROR.users||{});
  if(users.length===0){ html += `<div class="empty">محدش مسجل لسه</div>`; }
  else { users.forEach(([key,u])=>{ html += `<div class="group-card" style="cursor:default;"><div>${escapeHtml(u.name||key)}</div><button class="btn-danger btn-sm" onclick="deleteUser('${key}')">حذف الحساب</button></div>`; }); }
  html += `</div>`;

  app.innerHTML = html;
}
async function saveDeadline(){
  const val=document.getElementById("deadlineInput").value;
  if(!val){ showToast("اختار موعد الأول"); return; }
  const round=ROUNDS[(MIRROR.core.roundState||{currentIndex:0}).currentIndex];
  const iso=new Date(val).toISOString();
  await fbSet(`core/roundDeadlines/${round.key}`, iso);
  MIRROR.core.roundDeadlines[round.key]=iso;
  showToast("اتحفظ الموعد ✅");
}
async function saveAdminResults(){
  await fbSet("core/results", state._adminDraft);
  MIRROR.core.results=JSON.parse(JSON.stringify(state._adminDraft));
  showToast("اتحفظت النتائج ✅"); renderAdmin();
}
async function endCurrentRound(){
  const rs=MIRROR.core.roundState||{currentIndex:0};
  const round=ROUNDS[rs.currentIndex];
  const allFilled=round.matches.every(id=>MIRROR.core.results && MIRROR.core.results[id]);
  if(!allFilled){ showToast("لازم تحفظ نتائج كل مباريات الدور الأول"); return; }
  const rows=computeLeaderboardRows();
  const leader=rows[0];
  const scoresObj=Object.fromEntries(rows.map(r=>[r.key,r.total]));
  const entry={leaderName:leader?leader.user:"-", points:leader?leader.total:0, closedAt:Date.now(), scores:scoresObj};
  await fbSet(`core/roundHistory/${round.key}`, entry);
  MIRROR.core.roundHistory[round.key]=entry;
  seenRoundHistoryKeys.add(round.key);
  const nextIndex=rs.currentIndex+1;
  await fbSet("core/roundState", {currentIndex:nextIndex});
  MIRROR.core.roundState={currentIndex:nextIndex};
  showToast("تم إنهاء الدور 🎉"); renderAdmin();
}
async function saveAnnouncement(){
  const val=document.getElementById("announceInput").value.trim();
  await fbSet("core/announcement", val); MIRROR.core.announcement=val;
  showToast("اتحفظ الإعلان"); updateTicker();
}
async function clearAnnouncement(){
  await fbSet("core/announcement", ""); MIRROR.core.announcement="";
  showToast("اتمسح الإعلان"); updateTicker(); renderAdmin();
}
async function deleteUser(userKey){
  if(!confirm("متأكد إنك عايز تمسح الحساب ده نهائيًا؟")) return;
  await fbSet("users/"+userKey, null); await fbSet("predictions/"+userKey, null); await fbSet("submissions/"+userKey, null);
  delete MIRROR.users[userKey]; delete MIRROR.predictions[userKey]; delete MIRROR.submissions[userKey];
  for(const [gid,g] of Object.entries(MIRROR.groups||{})){
    if((g.members||[]).includes(userKey)){ const newMembers=g.members.filter(m=>m!==userKey); await fbSet(`groups/${gid}/members`, newMembers); g.members=newMembers; }
  }
  showToast("اتمسح الحساب"); renderAdmin();
}

/* ============ EXPORT / BACKUP ============ */
function exportExcel(){
  const results=MIRROR.core.results||{};
  const rows=computeLeaderboardRows();
  const totalMatches=decidedMatchesCount();
  const sheetData=rows.map((r,i)=>({ "الترتيب":i+1, "الاسم":r.user, "النقاط":r.total, "الدقة %": totalMatches?Math.round(r.total/totalMatches*100):0 }));
  const ws=XLSX.utils.json_to_sheet(sheetData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "الترتيب العام");
  XLSX.writeFile(wb, "نتائج-المحنكين.xlsx");
}
function exportBackup(){
  const data={core:MIRROR.core, predictions:MIRROR.predictions, submissions:MIRROR.submissions, users:MIRROR.users, groups:MIRROR.groups, chats:MIRROR.chats};
  const blob=new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="backup-almuhannakin-"+Date.now()+".json"; a.click();
  URL.revokeObjectURL(url);
}
function triggerImportBackup(){ document.getElementById("importFile").click(); }
async function importBackup(evt){
  const file=evt.target.files[0]; if(!file) return;
  if(!confirm("هيتم استبدال كل بيانات الموقع الحالية بالنسخة دي. متأكد؟")){ evt.target.value=""; return; }
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    await fbSet("core", data.core||{});
    await fbSet("predictions", data.predictions||{});
    await fbSet("submissions", data.submissions||{});
    await fbSet("users", data.users||{});
    await fbSet("groups", data.groups||{});
    await fbSet("chats", data.chats||{});
    showToast("اترجعت النسخة الاحتياطية ✅ (هتتحدث خلال ثواني)");
  }catch(e){ showToast("الملف مش صالح"); }
  evt.target.value="";
}

/* ============ INIT ============ */
initSync();
